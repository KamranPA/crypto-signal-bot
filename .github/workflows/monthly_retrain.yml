# مسیر فایل: .github/workflows/monthly_retrain.yml
name: Monthly Retrain

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch: {}

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly retrain job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m jobs.monthly_retrain

      - name: Commit updated models and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ ml/models/
          git diff --cached --quiet || git commit -m "chore: monthly retrain $(date -u +'%Y-%m-%d')"
          git push
