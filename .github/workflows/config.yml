# config.yml
# سیستم بک‌تست کریپتو — تنظیمات مرکزی
# تمام پارامترها اینجا تنظیم می‌شوند

# ---------------------------------------
# 🎯 تنظیمات اصلی
# ---------------------------------------
settings:
  exchange: kucoin                    # صرافی: kucoin, binance, bybit و غیره
  data_source: ohlcv                  # نوع داده
  limit: 1000                         # حداکثر تعداد کندل
  enable_htf_filter: false            # فیلتر روند با تایم‌فریم بالاتر
  htf_timeframe: "1h"                 # تایم‌فریم فیلتر (مثلاً 1H)

# ---------------------------------------
# 📅 بازه‌های زمانی قابل انتخاب (چندین سناریو)
# ---------------------------------------
date_scenarios:
  # شما می‌توانید یکی از این‌ها را در main.py فعال کنید
  today: 
    since: "2024-07-10"
    until: "2024-07-10"
  last_24h:
    since: "2024-07-09"
    until: "2024-07-10"
  last_week:
    since: "2024-07-03"
    until: "2024-07-10"
  last_month:
    since: "2024-06-01"
    until: "2024-07-01"
  custom_range:
    since: "2024-01-01"
    until: null  # تا آخرین داده

# ---------------------------------------
# ⏱️ تایم‌فریم‌های قابل انتخاب
# ---------------------------------------
timeframes:
  - "1m"
  - "5m"
  - "15m"
  - "30m"
  - "1h"
  - "4h"

# ---------------------------------------
# 💰 جفت ارزهای قابل انتخاب
# ---------------------------------------
symbols:
  major:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  altcoins:
    - "ADA/USDT"
    - "XRP/USDT"
    - "DOT/USDT"
  high_volatility:
    - "PEPE/USDT"
    - "SHIB/USDT"
    - "WIF/USDT"

# ---------------------------------------
# 🔔 تنظیمات اطلاع‌رسانی
# ---------------------------------------
notifications:
  telegram:
    enabled: true
    # توکن و چت آیدی از .env می‌آیند — امن
  log_to_file:
    enabled: true
    path: "logs/signals.log"

# ---------------------------------------
# 📊 استراتژی معاملاتی
# ---------------------------------------
strategy:
  name: "Vortex Volume Flow"
  description: "شکست کاذب + حجم بالا + EMA + VWAP"
  parameters:
    ema_fast: 8
    ema_slow: 21
    volume_ratio_threshold: 1.5
    min_candles: 50  # حداقل داده برای اعتبار تحلیل

# ---------------------------------------
# 🧪 حالت تست (برای توسعه)
# ---------------------------------------
debug:
  verbose: true
  save_csv: false
  csv_path: "backtest_results/"
