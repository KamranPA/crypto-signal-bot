name: 🚀 Manual Backtest
on:
  workflow_dispatch:
    inputs:
      symbol:
        description: '🔹 نماد (مثلاً BTC/USDT)'
        required: true
        default: 'BTC/USDT'
        type: string
      timeframe:
        description: '🔹 تایم‌فریم (15m, 1h, 4h)'
        required: true
        default: '1h'
        type: string
      start_date:
        description: '🔹 تاریخ شروع (YYYY-MM-DD)'
        required: true
        default: '2024-05-01'
        type: string
      end_date:
        description: '🔹 تاریخ پایان (YYYY-MM-DD)'
        required: true
        default: '2024-08-21'  # ✅ تاریخ فعلی
        type: string

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas requests
      - name: Run backtest
        env:
          SYMBOL: ${{ inputs.symbol }}
          TIMEFRAME: ${{ inputs.timeframe }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/backtest/backtester.py
