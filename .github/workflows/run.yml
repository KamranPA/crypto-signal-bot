name: Backtest

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol (e.g. BTC-USDT)'
        required: true
        default: 'BTC-USDT'
      timeframe:
        description: 'Timeframe (e.g. 1h, 4h)'
        required: true
        default: '1h'
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2024-01-01'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2024-06-01'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          INPUT_SYMBOL: ${{ github.event.inputs.symbol }}
          INPUT_TIMEFRAME: ${{ github.event.inputs.timeframe }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          path: |
            *.png
            *.jpg
          retention-days: 7
