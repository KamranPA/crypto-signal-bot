name: Run BTC Signal Bot

on:
  schedule:
    # ✅ دقیقاً در دقایق 00, 15, 30, 45 هر ساعت
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:  # اجازه اجرای دستی

jobs:
  run:
    runs-on: ubuntu-latest

    # ✅ جلوگیری از تداخل اجراها
    concurrency: btc-signal-job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ccxt requests pandas numpy

      - name: Run main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add signals.json last_hour_check.txt
          git commit -m "🔄 Update signals and hourly check" || exit 0
          git push
