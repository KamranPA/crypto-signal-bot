name: AI Backtest System (Final)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      symbol:
        description: 'ارزها (با کاما)'
        required: true
        default: 'BTC-USDT,ETH-USDT'
        type: string
      timeframe:
        description: 'تایم‌فریم'
        required: true
        default: '15min'
        type: choice
        options:
          - 1min
          - 3min
          - 15min
          - 1hour
          - 1day
      start_date:
        description: 'تاریخ شروع (YYYY-MM-DD)'
        required: true
        default: '2025-03-01'
        type: string
      end_date:
        description: 'تاریخ پایان (YYYY-MM-DD)'
        required: true
        default: '2025-04-01'
        type: string

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run with date range
        env:
          INPUT_SYMBOL: ${{ github.event.inputs.symbol }}
          INPUT_TIMEFRAME: ${{ github.event.inputs.timeframe }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
