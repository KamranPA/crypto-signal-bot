name: Run BTC Signal Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # هر ۱۵ دقیقه
  workflow_dispatch:         # امکان اجرای دستی

jobs:
  run:
    runs-on: ubuntu-latest
    # ✅ جلوگیری از تداخل اجراها
    concurrency: btc-signal-job

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push signals.json if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add signals.json
          git add last_hour_check.txt  # ✅ اضافه شده
          git commit -m "Update signals and hourly check" || exit 0
          git push
