# .github/workflows/main.yml
name: Backtest

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol (e.g. BTC-USDT, ETH-USDT)'
        required: true
        default: 'BTC-USDT'
      timeframe:
        description: 'Timeframe (e.g. 15m, 1h, 4h)'
        required: true
        default: '1h'
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2024-01-01'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2024-06-01'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: 3.10

      - name: Create and activate environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml
          conda activate trading-bot

      - name: Show environment info
        shell: bash -l {0}
        run: |
          conda activate trading-bot
          python --version
          python -c "import xgboost; print('✅ xgboost loaded')"
          python -c "import matplotlib; print('✅ matplotlib loaded')"

      - name: Run backtest
        shell: bash -l {0}
        env:
          INPUT_SYMBOL: ${{ github.event.inputs.symbol }}
          INPUT_TIMEFRAME: ${{ github.event.inputs.timeframe }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          conda activate trading-bot
          python main.py

      - name: Upload plots
        uses: actions/upload-artifact@v4  # ✅ تغییر به v4
        if: always()
        with:
          path: |
            *.png
            *.jpg
          retention-days: 7
