name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'نماد (مثلاً BTC/USDT)'
        required: true
        default: 'BTC/USDT'
      timeframe:
        description: 'تایم فریم (15m, 30m, 1h)'
        required: true
        default: '1h'
      days:
        description: 'تعداد روزهای داده (مثلاً 30)'
        required: true
        default: '30'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run backtest
        env:
          SYMBOL: ${{ inputs.symbol }}
          TIMEFRAME: ${{ inputs.timeframe }}
          DAYS: ${{ inputs.days }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python run_backtest.py

      - name: Success
        run: echo "✅ بک‌تست با موفقیت اجرا شد."
