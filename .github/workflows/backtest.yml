name: 📊 Simple Backtest (No Plot)

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: 🔽 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Install dependencies
        run: |
          pip install ccxt pandas

      - name: ▶️ Run backtest
        run: python backtest.py
