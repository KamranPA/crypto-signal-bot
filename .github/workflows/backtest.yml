name: 🚀 بک‌تست دستی

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: '🔸 نماد (مثلاً BTC/USDT)'
        required: true
        default: 'BTC/USDT'
      timeframe:
        description: '⏰ تایم‌فریم (مثلاً 15m)'
        required: true
        default: '1h'
      since:
        description: '📅 تاریخ شروع (YYYY-MM-DD)'
        required: true
        default: '2024-01-01'
      until:
        description: '📆 تاریخ پایان (YYYY-MM-DD)'
        required: true
        default: '2024-06-01'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 نصب وابستگی‌ها
        run: |
          pip install ccxt pandas numpy requests

      - name: 🏃 اجرای بک‌تست
        env:
          SYMBOL: ${{ inputs.symbol }}
          TIMEFRAME: ${{ inputs.timeframe }}
          SINCE: ${{ inputs.since }}
          UNTIL: ${{ inputs.until }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
