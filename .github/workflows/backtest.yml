name: 📊 Backtest with Dynamic Inputs

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'ارز مورد نظر'
        type: choice
        options:
          - 'BTC/USDT'
          - 'ETH/USDT'
          - 'SOL/USDT'
        default: 'BTC/USDT'

      timeframe:
        description: 'تایم‌فریم'
        type: choice
        options:
          - '1m'
          - '5m'
          - '15m'
          - '30m'
          - '1h'
          - '4h'
          - '1d'
        default: '15m'

      start_date:
        description: 'تاریخ شروع (YYYY-MM-DD)'
        type: string
        default: '2024-01-01'

      end_date:
        description: 'تاریخ پایان (YYYY-MM-DD)'
        type: string
        default: '2024-06-01'

jobs:
  backtest:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: 🔽 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Install dependencies
        run: |
          pip install ccxt pandas backtrader requests

      - name: 📁 Create directories
        run: |
          mkdir -p config

      - name: 🛠️ Create dynamic settings
        run: |
          cat <<EOF > config/dynamic_settings.json
          {
            "symbol": "${{ inputs.symbol }}",
            "timeframe": "${{ inputs.timeframe }}",
            "start_date": "${{ inputs.start_date }}",
            "end_date": "${{ inputs.end_date }}"
          }
          EOF
          echo "✅ تنظیمات ایجاد شد:"
          cat config/dynamic_settings.json

      - name: ▶️ Run backtest
        run: python backtest.py
