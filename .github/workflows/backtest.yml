# .github/workflows/backtest.yml

name: 📊 Crypto Backtest Runner (با تاریخ)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      symbol:
        description: 'ارز مورد نظر'
        type: choice
        options:
          - 'BTC/USDT'
          - 'ETH/USDT'
          - 'SOL/USDT'
          - 'ADA/USDT'
          - 'XRP/USDT'
        default: 'BTC/USDT'

      timeframe:
        description: 'تایم‌فریم'
        type: choice
        options:
          - '1m'
          - '5m'
          - '15m'
          - '30m'
          - '1h'
          - '4h'
          - '1d'
        default: '15m'

      start_date:
        description: 'تاریخ شروع (YYYY-MM-DD)'
        type: string
        default: '2024-01-01'

      end_date:
        description: 'تاریخ پایان (YYYY-MM-DD)'
        type: string
        default: '2024-06-01'

      run_reason:
        description: 'دلیل اجرای دستی'
        type: string
        required: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🔽 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📁 Create directories
        run: |
          mkdir -p logs data/cache config

      # 🔧 ایجاد تنظیمات پویا با تاریخ
      - name: 🛠️ Create dynamic config
        run: |
          cat <<EOF > config/dynamic_settings.json
          {
            "symbols": ["${{ github.event.inputs.symbol }}"],
            "timeframe": "${{ github.event.inputs.timeframe }}",
            "start_date": "${{ github.event.inputs.start_date }}",
            "end_date": "${{ github.event.inputs.end_date }}",
            "fib_entry_level": 0.71,
            "fib_tp_level": 0.0,
            "fib_sl_level": 1.0,
            "enable_telegram": true,
            "debug": true
          }
          EOF
          echo "✅ Config created:"
          cat config/dynamic_settings.json

      - name: 🔐 Setup Telegram Secrets
        if: ${{ secrets.TELEGRAM_BOT_TOKEN && secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p secrets
          cat <<EOF > secrets/telegram_secrets.json
          {
            "telegram_token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
            "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}"
          }
          EOF

      - name: ▶️ Run Backtest
        run: python backtest.py

      - name: 📤 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
